<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">

<title>MHC Revenue — Upravljanje cen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>

<style>

    --navy: #162040;
    --navy-light: #1e2d56;
    --navy-dark: #0e1628;
    --gold: #b49448;
    --gold-light: #d4b870;
    --gold-pale: #f5edd8;
    --white: #ffffff;
    --gray-50: #f8f9fb;

    --gray-200: #dde1eb;

  .auth-card {
    background: var(--white);

  .auth-logo { text-align: center; margin-bottom: 32px; }
  .auth-logo .brand { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; color: var(--navy); letter-spacing: 2px; }
  .auth-logo .sub { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-top: 4px; }
  .auth-logo .divider { width: 40px; height: 2px; background: var(--gold); margin: 12px auto; }
  .form-group { margin-bottom: 20px; }
  .form-group label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gray-600); margin-bottom: 6px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 11px 14px; border: 1px solid var(--gray-200);
    border-radius: 8px; font-family: 'Nunito', sans-serif; font-size: 14px; color: var(--navy);
    background: var(--white); transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none; border-color: var(--gold);
  }
  .btn-primary {
    width: 100%; padding: 13px; background: var(--navy); color: var(--white);
    border: none; border-radius: 8px; font-family: 'Nunito', sans-serif;
    font-size: 14px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer; transition: background 0.2s;
  }
  .btn-primary:hover { background: var(--navy-light); }
  .btn-gold {
    padding: 10px 20px; background: var(--gold); color: var(--white);
    border: none; border-radius: 8px; font-family: 'Nunito', sans-serif;
    font-size: 13px; font-weight: 700; cursor: pointer; transition: background 0.2s;
  }
  .btn-gold:hover { background: var(--gold-light); }
  .btn-outline {
    padding: 8px 16px; background: transparent; color: var(--navy);
    border: 1.5px solid var(--navy); border-radius: 8px; font-family: 'Nunito', sans-serif;
    font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s;
  }
  .btn-outline:hover { background: var(--navy); color: var(--white); }
  .btn-sm {
    padding: 6px 14px; background: var(--gray-100); color: var(--gray-600);
    border: none; border-radius: 6px; font-family: 'Nunito', sans-serif;
    font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .btn-sm:hover { background: var(--gray-200); }
  .btn-danger-sm {
    padding: 6px 14px; background: var(--red-light); color: var(--red);
    border: none; border-radius: 6px; font-family: 'Nunito', sans-serif;
    font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .error-msg { color: var(--red); font-size: 13px; margin-top: 12px; text-align: center; }

  /* LAYOUT */
  .app-shell { display: flex; min-height: 100vh; }
  .sidebar {
    width: 240px; min-width: 240px; background: var(--navy); color: var(--white);
    display: flex; flex-direction: column;

  .sidebar-logo .sub { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-top: 2px; }
  .sidebar-hotel {

  .sidebar-nav { flex: 1; padding: 16px 0; }
  .nav-section { padding: 8px 24px 4px; font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.3); }
  .nav-item {

  .sidebar-footer {

  .sidebar-footer:hover { color: rgba(255,255,255,0.7); }
  .main { margin-left: 240px; flex: 1; }
  .topbar {
    background: var(--white); border-bottom: 1px solid var(--gray-200);

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

  /* KPI TILES */
  .kpi-tile { background: var(--white); border-radius: 12px; border: 1px solid var(--gray-200); padding: 20px; }
  .kpi-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gray-400); margin-bottom: 8px; }
  .kpi-value { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 700; color: var(--navy); line-height: 1; }
  .kpi-sub { font-size: 12px; color: var(--gray-400); margin-top: 6px; }
  .kpi-change { font-size: 12px; font-weight: 700; margin-top: 4px; }
  .kpi-change.up { color: var(--green); }
  .kpi-change.down { color: var(--red); }
  .kpi-tile.highlight { background: var(--navy); border-color: var(--navy); }
  .kpi-tile.highlight .kpi-label { color: rgba(255,255,255,0.5); }
  .kpi-tile.highlight .kpi-value { color: var(--gold-light); }
  .kpi-tile.highlight .kpi-sub { color: rgba(255,255,255,0.4); }

  /* PRICING TABLE */
  .pricing-table { width: 100%; border-collapse: collapse; }

    text-align: left; padding: 10px 14px; font-size: 10px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase; color: var(--gray-400);

  .pricing-table td { padding: 14px; border-bottom: 1px solid var(--gray-100); font-size: 13px; vertical-align: middle; }
  .pricing-table tr:hover td { background: var(--gray-50); }
  .price-rec { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 700; color: var(--navy); }
  .price-base { font-size: 12px; color: var(--gray-400); text-decoration: line-through; }
  .price-delta { font-size: 12px; font-weight: 700; }
  .price-delta.up { color: var(--green); }
  .price-delta.down { color: var(--red); }
  .price-delta.neutral { color: var(--gray-400); }
  .occ-bar-wrap { background: var(--gray-200); border-radius: 4px; height: 6px; width: 80px; }
  .occ-bar { height: 6px; border-radius: 4px; background: var(--navy); }
  .tag { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
  .tag-high { background: var(--red-light); color: var(--red); }
  .tag-med { background: var(--orange-light); color: var(--orange); }
  .tag-low { background: var(--green-light); color: var(--green); }
  .tag-blue { background: #e8eef8; color: var(--navy); }

  /* AI REASONING */
  .ai-reasoning {
    background: var(--navy-dark); color: rgba(255,255,255,0.85);
    border-radius: 8px; padding: 16px; font-size: 13px; line-height: 1.7;
    border-left: 3px solid var(--gold);
    white-space: pre-wrap;

  .ai-reasoning .ai-label {
    font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
  }
  .ai-loading { color: rgba(255,255,255,0.4); font-style: italic; }

  /* WEATHER */
  .weather-widget {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
    color: var(--white); border-radius: 12px; padding: 20px;
  }
  .weather-temp { font-family: 'Cormorant Garamond', serif; font-size: 48px; font-weight: 700; line-height: 1; }
  .weather-desc { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 4px; }
  .weather-row { display: flex; gap: 16px; margin-top: 16px; }
  .weather-item { font-size: 12px; color: rgba(255,255,255,0.5); }
  .weather-item strong { color: var(--white); display: block; font-size: 14px; }

  /* COMPETITOR */
  .competitor-card {
    border: 1px solid var(--gray-200); border-radius: 10px; padding: 16px;
    display: flex; align-items: center; justify-content: space-between;
    transition: border-color 0.2s;
  }
  .competitor-card:hover { border-color: var(--gold); }
  .comp-name { font-weight: 700; font-size: 14px; color: var(--navy); }
  .comp-type { font-size: 11px; color: var(--gray-400); }
  .comp-price { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 700; color: var(--navy); text-align: right; }
  .comp-vs { font-size: 11px; font-weight: 700; }
  .comp-vs.above { color: var(--green); }
  .comp-vs.below { color: var(--red); }

  /* EVENTS */
  .event-item {
    display: flex; align-items: center; gap: 14px; padding: 12px 0;
    border-bottom: 1px solid var(--gray-100);
  }
  .event-date { min-width: 50px; text-align: center; }
  .event-date .day { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; line-height: 1; color: var(--navy); }
  .event-date .month { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--gray-400); }
  .event-body { flex: 1; }
  .event-name { font-weight: 700; font-size: 14px; color: var(--navy); }
  .event-loc { font-size: 12px; color: var(--gray-400); margin-top: 2px; }
  .event-impact { font-size: 12px; font-weight: 700; color: var(--orange); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center; z-index: 200;
  }
  .modal {
    background: var(--white); border-radius: 12px; padding: 32px;
    width: 480px; max-height: 90vh; overflow-y: auto;
    box-shadow: 0 32px 80px rgba(0,0,0,0.25);
  }
  .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: var(--navy); margin-bottom: 24px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }

  /* CHIP */
  .chip { display: inline-flex; align-items: center; gap: 6px; background: var(--gold-pale); color: var(--navy); padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }

  /* CHART CONTAINER */
  .chart-wrap { position: relative; height: 220px; }

  /* MISC */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; color: var(--navy); }
  .divider { height: 1px; background: var(--gray-200); margin: 24px 0; }
  .empty-state { text-align: center; padding: 40px; color: var(--gray-400); font-size: 14px; }
  .badge-pill {
    display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
  }
  .badge-demo { background: var(--gold-pale); color: var(--gold); }
  .scroll-wrap { overflow-x: auto; }

  @media(max-width: 900px) {
    .sidebar { display: none; }
    .main { margin-left: 0; }
    .grid-4 { grid-template-columns: repeat(2, 1fr); }
    .grid-2 { grid-template-columns: 1fr; }
  }
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── DEMO DATA ─────────────────────────────────────────────────────────────
const DEMO_HOTEL = {
  id: 'vila-bled',
  name: 'Vila Bled',
  location: 'Bled, Slovenija',
  lat: 46.37,
  lon: 14.09,
  rooms: 30,
  roomTypes: [
    { id: 'st', name: 'Soba s pogledom na jezero', count: 12, basePrice: 336, minPrice: 240, maxPrice: 500 },
    { id: 'su', name: 'Superior', count: 10, basePrice: 313, minPrice: 220, maxPrice: 460 },
    { id: 'jn', name: 'Suita s pogledom na jezero', count: 5, basePrice: 386, minPrice: 280, maxPrice: 580 },
    { id: 'dt', name: 'Suita Deluxe', count: 3, basePrice: 486, minPrice: 360, maxPrice: 720 },
  ]
};

const DEMO_COMPETITORS = [
  { id: 1, name: 'Grand Hotel Toplice', type: 'Direktna konkurenca', stars: 5, avgPrice: 290, threat: 'high', notes: 'Referenčna točka za višje segmente' },
  { id: 2, name: 'Hotel Jezero', type: 'Direktna konkurenca', stars: 4, avgPrice: 195, threat: 'high', notes: 'Zelo podobna ponudba, aktivno znižuje cene' },
  { id: 3, name: 'Triglav Bled', type: 'Direktna konkurenca', stars: 4, avgPrice: 170, threat: 'med', notes: 'Budget-friendly, dela pritisk navzdol' },
  { id: 4, name: 'Penzion Mayer', type: 'Posredna konkurenca', stars: 3, avgPrice: 110, threat: 'low', notes: '' },
];

function buildDemoReservations() {
  const data = [];
  const today = new Date();
  const types = ['st','su','jn','dt'];
  const channels = ['Booking.com','Direct','Expedia','HRS'];
  for(let i = -60; i <= 90; i++){
    const d = new Date(today); d.setDate(d.getDate()+i);
    const dayOfYear = Math.floor((d - new Date(d.getFullYear(),0,0)) / 86400000);
    const seasonal = 1 + 0.6*Math.sin((dayOfYear/365)*2*Math.PI - 1.5);
    const rooms = Math.round(DEMO_HOTEL.rooms * 0.5 * seasonal + Math.random()*8 - 4);
    data.push({ date: d.toISOString().split('T')[0], occupiedRooms: Math.max(0,Math.min(rooms,DEMO_HOTEL.rooms)), revenue: rooms * 220 * seasonal });
  }
  return data;
}
const DEMO_RESERVATIONS = buildDemoReservations();

const DEMO_EVENTS = [
  { id: 1, name: 'Okusiti Slovenijo', date: '2026-07-04', end_date: '2026-07-06', event_type: 'festival', location: 'Bled', impact_multiplier: 1.18, expected_demand: 'high', city: 'Bled' },
  { id: 2, name: 'Bled Strategic Forum', date: '2026-09-02', end_date: '2026-09-04', event_type: 'conference', location: 'Bled', impact_multiplier: 1.35, expected_demand: 'very_high', city: 'Bled' },
  { id: 3, name: 'Triglav Trail', date: '2026-07-18', end_date: '2026-07-19', event_type: 'sports', location: 'Bled', impact_multiplier: 1.22, expected_demand: 'high', city: 'Bled' },
  { id: 4, name: 'Ljubljana Festival', date: '2026-07-11', end_date: '2026-07-13', event_type: 'festival', location: 'Ljubljana', impact_multiplier: 1.08, expected_demand: 'medium', city: 'Ljubljana' },
  { id: 5, name: 'Poletni kongres HGS', date: '2026-06-25', end_date: '2026-06-26', event_type: 'conference', location: 'Bled', impact_multiplier: 1.15, expected_demand: 'medium', city: 'Bled' },
];

const SLO_HOLIDAYS = ['01-01','02-08','04-27','05-01','05-02','06-08','06-25','08-15','10-31','11-01','12-25','12-26'];

// ─── UTILS ──────────────────────────────────────────────────────────────────
function formatEUR(n){ return new Intl.NumberFormat('sl-SI',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n); }
function fmt(n){ return new Intl.NumberFormat('sl-SI').format(n); }

function getOccupancyForDate(dateStr){
  const r = DEMO_RESERVATIONS.find(d=>d.date===dateStr);
  if(!r) return { pct: 0, rooms: 0 };
  return { pct: Math.round(r.occupiedRooms/DEMO_HOTEL.rooms*100), rooms: r.occupiedRooms };
}

function getPriceRecommendation(roomType, dateStr, weather, occ){
  const base = roomType.basePrice;
  const date = new Date(dateStr);
  const month = date.getMonth()+1;
  const dayOfWeek = date.getDay();
  const mmdd = `${String(month).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
  
  let mult = 1.0;
  // Sezonskost
  if([7,8].includes(month)) mult *= 1.35;
  else if([6,9].includes(month)) mult *= 1.15;
  else if([12,3].includes(month)) mult *= 1.10; // ski
  else if([1,2].includes(month)) mult *= 0.75;
  
  // Weekend
  if([5,6].includes(dayOfWeek)) mult *= 1.12;
  
  // Prazniki
  if(SLO_HOLIDAYS.includes(mmdd)) mult *= 1.20;
  
  // Zasedenost
  if(occ > 80) mult *= 1.15;
  else if(occ > 60) mult *= 1.05;
  else if(occ < 30) mult *= 0.88;
  
  // Vreme
  if(weather?.weathercode !== undefined){
    const wc = weather.weathercode;
    if(wc === 0 || wc === 1) mult *= 1.08; // sončno
    else if(wc >= 61) mult *= 0.94; // dež
  }
  
  const rec = Math.round(base * mult / 5) * 5;
  return Math.max(roomType.minPrice, Math.min(roomType.maxPrice, rec));
}

// ─── LOGIN ───────────────────────────────────────────────────────────────────
function LoginScreen({ onLogin }){
  const [email,setEmail] = useState('admin@mhc-ai.eu');
  const [pass,setPass] = useState('demo2025');
  const [err,setErr] = useState('');

  function handleLogin(e){
    e.preventDefault();
    if(email==='admin@mhc-ai.eu' && pass==='demo2025') onLogin('admin');
    else if(email==='hotel@vilabled.si' && pass==='vilabled') onLogin('hotel');
    else setErr('Napačni podatki. Demo: admin@mhc-ai.eu / demo2025');
  }

  return (
    <div className="auth-screen">
      <div className="auth-card">
        <div className="auth-logo">
          <div className="brand">MHC REVENUE</div>
          <div className="sub">Revenue Management Platform</div>
          <div className="divider"></div>
        </div>
        <form onSubmit={handleLogin}>
          <div className="form-group">
            <label>E-pošta</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} />
          </div>
          <div className="form-group">
            <label>Geslo</label>
            <input type="password" value={pass} onChange={e=>setPass(e.target.value)} />
          </div>
          <button type="submit" className="btn-primary">Prijava</button>
          {err && <div className="error-msg">{err}</div>}
        </form>
        <div style={{marginTop:20,padding:16,background:'#f8f9fb',borderRadius:8,fontSize:12,color:'#8892a8'}}>
          <strong style={{display:'block',marginBottom:4}}>Demo dostopi:</strong>
          admin@mhc-ai.eu / demo2025 (Admin)<br/>
          hotel@vilabled.si / vilabled (Hotel)
        </div>
      </div>
    </div>
  );
}

// ─── WEATHER WIDGET ──────────────────────────────────────────────────────────
function WeatherWidget({ lat, lon }){
  const [weather, setWeather] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(()=>{
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=precipitation_sum,weathercode&timezone=Europe%2FBerlin&forecast_days=3`)
      .then(r=>r.json()).then(d=>{
        setWeather(d);
        setLoading(false);
      }).catch(()=>setLoading(false));
  },[lat,lon]);

  const WC_DESC = {0:'Jasno',1:'Pretežno jasno',2:'Delno oblačno',3:'Oblačno',45:'Megla',48:'Ledena megla',51:'Rahla rosica',53:'Zmerna rosica',55:'Gosta rosica',61:'Lahek dež',63:'Zmeren dež',65:'Plohe',71:'Lahek sneg',73:'Zmeren sneg',80:'Plohe',81:'Močne plohe',95:'Nevihta',99:'Huda nevihta'};
  const WC_ICON = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',61:'🌧️',63:'🌧️',71:'❄️',80:'🌦️',95:'⛈️'};

  if(loading) return <div className="weather-widget" style={{padding:20,fontSize:13,color:'rgba(255,255,255,0.5)'}}>Nalagam vreme…</div>;
  if(!weather?.current_weather) return <div className="weather-widget" style={{padding:20,fontSize:13,color:'rgba(255,255,255,0.5)'}}>Vreme ni na voljo.</div>;

  const cw = weather.current_weather;
  const wc = cw.weathercode;
  const icon = WC_ICON[wc] || '🌡️';
  const desc = WC_DESC[wc] || 'Neznano';

  return (
    <div className="weather-widget">
      <div style={{fontSize:12,color:'rgba(255,255,255,0.5)',marginBottom:12,display:'flex',justifyContent:'space-between'}}>
        <span>📍 Bled, SLO</span>
        <span>Open-Meteo</span>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <span style={{fontSize:40}}>{icon}</span>
        <div>
          <div className="weather-temp">{Math.round(cw.temperature)}°C</div>
          <div className="weather-desc">{desc}</div>
        </div>
      </div>
      <div className="weather-row">
        <div className="weather-item"><strong>{Math.round(cw.windspeed)} km/h</strong>Veter</div>
        {weather.daily?.precipitation_sum?.[0] !== undefined && (
          <div className="weather-item"><strong>{weather.daily.precipitation_sum[0]} mm</strong>Padavine</div>
        )}
        <div className="weather-item"><strong>{cw.is_day ? 'Dan' : 'Noč'}</strong>Čas</div>
      </div>
    </div>
  );
}

// ─── DASHBOARD ───────────────────────────────────────────────────────────────
function Dashboard({ hotel }){
  const chartRef = useRef(null);
  const chartInst = useRef(null);
  const today = new Date().toISOString().split('T')[0];
  const occ = getOccupancyForDate(today);
  const last30 = DEMO_RESERVATIONS.filter(r=>r.date >= new Date(Date.now()-30*86400000).toISOString().split('T')[0] && r.date <= today);
  const totalRev = last30.reduce((s,r)=>s+r.revenue,0);
  const avgOcc = Math.round(last30.reduce((s,r)=>s+r.occupiedRooms,0)/last30.length);
  const avgOccPct = Math.round(avgOcc/hotel.rooms*100);
  const todayRec = getPriceRecommendation(hotel.roomTypes[1], today, null, occ.pct);

  useEffect(()=>{
    if(!chartRef.current) return;
    if(chartInst.current) chartInst.current.destroy();
    const todayStr2 = new Date().toISOString().split('T')[0];
    const past30 = new Date(Date.now()-29*86400000).toISOString().split('T')[0];
    const slice = DEMO_RESERVATIONS.filter(r=>r.date >= past30 && r.date <= todayStr2);
    chartInst.current = new Chart(chartRef.current,{
      type:'bar',
      data:{
        labels: slice.map(r=>r.date.slice(5)),
        datasets:[{
          label:'Prihodki (€)',
          data: slice.map(r=>r.revenue),
          backgroundColor: slice.map(r=>{
            return r.date < todayStr2 ? '#162040' : '#b49448';
          }),
          borderRadius: 3,
        }]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ display:false }, tooltip:{ callbacks:{ label:ctx=>`€ ${fmt(ctx.raw)}` } } },
        scales:{
          x:{ grid:{display:false}, ticks:{ font:{size:10}, color:'#8892a8', maxRotation:0, maxTicksLimit:10 } },
          y:{ grid:{ color:'#eef0f5' }, ticks:{ font:{size:10}, color:'#8892a8', callback:v=>`€${v/1000}k` } }
        }
      }
    });
  },[]);

  const upcoming = DEMO_EVENTS.filter(e=>e.end_date >= today).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,3);

  return (
    <div>
      <div className="grid-4">
        <div className="kpi-tile highlight">
          <div className="kpi-label">Priporočena cena danes</div>
          <div className="kpi-value">{formatEUR(todayRec)}</div>
          <div className="kpi-sub">Superior soba</div>
        </div>
        <div className="kpi-tile">
          <div className="kpi-label">Zasedenost danes</div>
          <div className="kpi-value">{occ.pct}%</div>
          <div className="kpi-sub">{occ.rooms} / {hotel.rooms} sob</div>
        </div>
        <div className="kpi-tile">
          <div className="kpi-label">Prihodki (zadnjih 30 dni)</div>
          <div className="kpi-value">{formatEUR(totalRev)}</div>
          <div className="kpi-change up">↑ +12% vs lani</div>
        </div>
        <div className="kpi-tile">
          <div className="kpi-label">Povp. zasedenost (30 dni)</div>
          <div className="kpi-value">{avgOccPct}%</div>
          <div className="kpi-sub">{avgOcc} sob povprečno</div>
        </div>
      </div>

      <div className="grid-2">
        <div className="card">
          <div className="card-title">📊 Prihodki — zadnjih 30 dni</div>
          <div className="chart-wrap"><canvas ref={chartRef}></canvas></div>
          <div style={{marginTop:12,fontSize:11,color:'#8892a8',display:'flex',gap:16}}>
            <span><span style={{display:'inline-block',width:10,height:10,background:'#162040',borderRadius:2,marginRight:4}}></span>Realizirano</span>
            <span><span style={{display:'inline-block',width:10,height:10,background:'#b49448',borderRadius:2,marginRight:4}}></span>Prihodnje</span>
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <WeatherWidget lat={hotel.lat} lon={hotel.lon} />
          <div className="card" style={{flex:1}}>
            <div className="card-title">🗓️ Prihajajoči dogodki</div>
            {upcoming.map(ev=>{
              const DEMAND_LABEL = { low:'Nizko', medium:'Srednje', high:'Visoko', very_high:'Zelo visoko' };
              const DEMAND_CLASS = { low:'tag-low', medium:'tag-med', high:'tag-med', very_high:'tag-high' };
              const impactPct = '+' + Math.round((ev.impact_multiplier - 1)*100) + '%';
              return (
              <div key={ev.id} className="event-item">
                <div className="event-date">
                  <div className="day">{new Date(ev.date).getDate()}</div>
                  <div className="month">{['Jan','Feb','Mar','Apr','Maj','Jun','Jul','Avg','Sep','Okt','Nov','Dec'][new Date(ev.date).getMonth()]}</div>
                </div>
                <div className="event-body">
                  <div className="event-name">{ev.name}</div>
                  <div className="event-loc">{ev.city} · {ev.event_type}</div>
                </div>
                <span className="tag tag-med">{impactPct}</span>
              </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── PRICING ENGINE ───────────────────────────────────────────────────────────
function PricingEngine({ hotel }){
  const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
  const [weather, setWeather] = useState(null);
  const [reasoning, setReasoning] = useState('');
  const [loadingAI, setLoadingAI] = useState(false);
  const [generated, setGenerated] = useState(false);

  useEffect(()=>{
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${hotel.lat}&longitude=${hotel.lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum&timezone=Europe%2FBerlin&forecast_days=14`)
      .then(r=>r.json()).then(d=>{
        const idx = d.daily.time.indexOf(selectedDate);
        if(idx>=0) setWeather({ weathercode: d.daily.weathercode[idx], tmax: d.daily.temperature_2m_max[idx], tmin: d.daily.temperature_2m_min[idx], rain: d.daily.precipitation_sum[idx] });
        else setWeather(null);
      }).catch(()=>{});
  },[selectedDate]);

  const occ = getOccupancyForDate(selectedDate);
  const recs = hotel.roomTypes.map(rt=>({
    ...rt,
    rec: getPriceRecommendation(rt, selectedDate, weather, occ.pct),
  }));

  const date = new Date(selectedDate);
  const month = date.getMonth()+1;
  const dayOfWeek = ['Ned','Pon','Tor','Sre','Čet','Pet','Sob'][date.getDay()];
  const isWeekend = [5,6].includes(date.getDay());
  const isPeak = [7,8].includes(month);
  const mmdd = `${String(month).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
  const isHoliday = SLO_HOLIDAYS.includes(mmdd);

  async function generateReasoning(){
    setLoadingAI(true);
    setReasoning('');
    setGenerated(false);
    const prompt = `Si AI revenue manager za hotel ${hotel.name} v ${hotel.location}.

Analiziraj datum: ${selectedDate} (${dayOfWeek})
Podatki za pricing:
- Mesec: ${month} ${isPeak ? '(PEAK sezona — julij/avgust)' : isWeekend ? '(vikend)' : ''}
- Državni praznik: ${isHoliday ? 'DA' : 'NE'}
- Zasedenost tega dne: ${occ.pct}% (${occ.rooms}/${hotel.rooms} sob)
- Vreme: ${weather ? `${weather.tmax}°C max, ${weather.tmin}°C min, padavine ${weather.rain}mm, koda ${weather.weathercode}` : 'Ni podatkov'}
- Priporočene cene po tipih sobe: ${recs.map(r=>`${r.name} → €${r.rec}`).join(', ')}

Napiši strokovno analizo zakaj priporočamo te cene — v slovenščini, 4-5 stavkov. Bodi konkreten in vezan na dejanske faktorje. Ne povzemaj cen, razloži ZAKAJ.`;

    try {
  const res = await fetch('/api/ai', {
  method: 'POST',
  headers: {'Content-Type': 'application/json'},
  body: JSON.stringify({ prompt: prompt })
});
const data = await res.json();
const text = data.text || 'Napaka pri generiranju analize.';
      setReasoning(text);
      setGenerated(true);
    } catch(e){
      setReasoning('Napaka pri klicu AI — preverite API ključ.');
    }
    setLoadingAI(false);
  }

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:24,flexWrap:'wrap'}}>
        <div>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',color:'#8892a8',marginBottom:6}}>Datum analize</div>
          <input type="date" value={selectedDate} onChange={e=>setSelectedDate(e.target.value)}
            style={{padding:'10px 14px',border:'1px solid #dde1eb',borderRadius:8,fontFamily:'Nunito',fontSize:14,color:'#162040'}} />
        </div>
        <div style={{marginTop:20}}>
          <span className="chip">{dayOfWeek}</span>{' '}
          {isPeak && <span className="chip" style={{background:'#fdecea',color:'#c0392b'}}>Peak sezona</span>}{' '}
          {isWeekend && <span className="chip">Vikend +12%</span>}{' '}
          {isHoliday && <span className="chip" style={{background:'#fdecea',color:'#c0392b'}}>Državni praznik</span>}
        </div>
        <div style={{marginLeft:'auto',marginTop:20}}>
          <button className="btn-gold" onClick={generateReasoning} disabled={loadingAI}>
            {loadingAI ? '⏳ Analiziram…' : '🤖 AI analiza'}
          </button>
        </div>
      </div>

      <div className="grid-2" style={{marginBottom:24}}>
        <div className="card">
          <div style={{fontSize:11,fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',color:'#8892a8',marginBottom:8}}>Zasedenost tega dne</div>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{fontFamily:'Cormorant Garamond',fontSize:36,fontWeight:700,color:'#162040'}}>{occ.pct}%</div>
            <div style={{flex:1}}>
              <div style={{background:'#eef0f5',borderRadius:6,height:8,overflow:'hidden'}}>
                <div style={{height:8,width:`${occ.pct}%`,background: occ.pct > 80 ? '#c0392b' : occ.pct > 60 ? '#d97706' : '#162040',borderRadius:6,transition:'width 0.5s'}}></div>
              </div>
              <div style={{fontSize:12,color:'#8892a8',marginTop:4}}>{occ.rooms} / {hotel.rooms} sob</div>
            </div>
          </div>
        </div>
        <div className="card">
          <div style={{fontSize:11,fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',color:'#8892a8',marginBottom:8}}>Vreme za ta dan</div>
          {weather ? (
            <div>
              <span style={{fontSize:28}}>{weather.weathercode === 0 ? '☀️' : weather.weathercode <= 3 ? '⛅' : weather.weathercode >= 61 ? '🌧️' : '🌤️'}</span>
              <span style={{fontFamily:'Cormorant Garamond',fontSize:28,fontWeight:700,color:'#162040',marginLeft:8}}>{weather.tmax}°C</span>
              <span style={{fontSize:13,color:'#8892a8',marginLeft:6}}>/ {weather.tmin}°C</span>
              <div style={{fontSize:12,color:'#8892a8',marginTop:4}}>Padavine: {weather.rain} mm</div>
            </div>
          ) : <div style={{fontSize:13,color:'#8892a8'}}>Ni podatkov za ta datum (>14 dni naprej)</div>}
        </div>
      </div>

      <div className="card" style={{marginBottom:24}}>
        <div className="card-title">💡 Priporočene cene po tipu sobe</div>
        <div className="scroll-wrap">
          <table className="pricing-table" style={{width:'100%'}}>
            <thead>
              <tr>
                <th>Tip sobe</th>
                <th>Osnovna cena</th>
                <th>Priporočena cena</th>
                <th>Razlika</th>
                <th>Min</th>
                <th>Max</th>
              </tr>
            </thead>
            <tbody>
              {recs.map(rt=>{
                const delta = rt.rec - rt.basePrice;
                const deltaPct = Math.round(delta/rt.basePrice*100);
                return (
                  <tr key={rt.id}>
                    <td><strong>{rt.name}</strong><br/><span style={{fontSize:11,color:'#8892a8'}}>{rt.count} sob</span></td>
                    <td><span className="price-base">{formatEUR(rt.basePrice)}</span></td>
                    <td><span className="price-rec">{formatEUR(rt.rec)}</span></td>
                    <td><span className={`price-delta ${delta>0?'up':delta<0?'down':'neutral'}`}>{delta>0?'+':''}{deltaPct}%</span></td>
                    <td style={{fontSize:12,color:'#8892a8'}}>{formatEUR(rt.minPrice)}</td>
                    <td style={{fontSize:12,color:'#8892a8'}}>{formatEUR(rt.maxPrice)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {(reasoning || loadingAI) && (
        <div className="ai-reasoning">
          <div className="ai-label">
            <span>⚡</span> MHC AI · Analiza priporočil
          </div>
          {loadingAI ? <span className="ai-loading">Generiram analizo…</span> : reasoning}
        </div>
      )}

      {!generated && !loadingAI && (
        <div style={{background:'#f8f9fb',borderRadius:10,padding:20,textAlign:'center',color:'#8892a8',fontSize:13}}>
          Kliknite <strong>"AI analiza"</strong> za generiranje utemeljitve priporočil v slovenščini.
        </div>
      )}
    </div>
  );
}

// ─── COMPETITOR RADAR ─────────────────────────────────────────────────────────
function CompetitorRadar({ hotel }){
  const [competitors, setCompetitors] = useState(DEMO_COMPETITORS);
  const [showModal, setShowModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({ name:'', type:'Direktna konkurenca', stars:4, avgPrice:'', threat:'med', notes:'' });

  const hotelADR = 220;
  const avgCompPrice = Math.round(competitors.reduce((s,c)=>s+c.avgPrice,0)/competitors.length);

  function openAdd(){ setEditing(null); setForm({ name:'', type:'Direktna konkurenca', stars:4, avgPrice:'', threat:'med', notes:'' }); setShowModal(true); }
  function openEdit(c){ setEditing(c.id); setForm({...c, avgPrice:String(c.avgPrice)}); setShowModal(true); }
  function save(){
    if(!form.name.trim() || !form.avgPrice) return;
    const entry = {...form, avgPrice:Number(form.avgPrice), id: editing || Date.now()};
    if(editing) setCompetitors(cs=>cs.map(c=>c.id===editing?entry:c));
    else setCompetitors(cs=>[...cs, entry]);
    setShowModal(false);
  }
  function remove(id){ setCompetitors(cs=>cs.filter(c=>c.id!==id)); }

  const THREAT_LABEL = { high:'Visoka', med:'Srednja', low:'Nizka' };
  const THREAT_CLASS = { high:'tag-high', med:'tag-med', low:'tag-low' };

  return (
    <div>
      <div className="grid-3" style={{marginBottom:24}}>
        <div className="kpi-tile">
          <div className="kpi-label">Vaša povp. cena (ADR)</div>
          <div className="kpi-value">{formatEUR(hotelADR)}</div>
        </div>
        <div className="kpi-tile">
          <div className="kpi-label">Povp. cena konkurence</div>
          <div className="kpi-value">{formatEUR(avgCompPrice)}</div>
          <div className={`kpi-change ${hotelADR < avgCompPrice ? 'up':'down'}`}>{hotelADR < avgCompPrice ? `↓ Nižje za €${avgCompPrice-hotelADR}` : `↑ Višje za €${hotelADR-avgCompPrice}`}</div>
        </div>
        <div className="kpi-tile">
          <div className="kpi-label">Visoka grožnja</div>
          <div className="kpi-value">{competitors.filter(c=>c.threat==='high').length}</div>
          <div className="kpi-sub">od {competitors.length} konkurentov</div>
        </div>
      </div>

      <div className="card">
        <div className="section-header">
          <div className="section-title">🎯 Konkurenčno okolje</div>
          <button className="btn-gold" onClick={openAdd}>+ Dodaj konkurenta</button>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {competitors.map(c=>{
            const vs = c.avgPrice - hotelADR;
            return (
              <div key={c.id} className="competitor-card">
                <div style={{display:'flex',alignItems:'center',gap:12}}>
                  <div style={{fontFamily:'Cormorant Garamond',fontSize:22,color:'#b49448'}}>{'★'.repeat(c.stars)}</div>
                  <div>
                    <div className="comp-name">{c.name}</div>
                    <div className="comp-type">{c.type}</div>
                    {c.notes && <div style={{fontSize:11,color:'#8892a8',marginTop:2}}>{c.notes}</div>}
                  </div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:16}}>
                  <div style={{textAlign:'right'}}>
                    <div className="comp-price">{formatEUR(c.avgPrice)}</div>
                    <div className={`comp-vs ${vs>0?'above':'below'}`}>{vs>0?`+€${vs} nad vami`:`€${Math.abs(vs)} pod vami`}</div>
                  </div>
                  <span className={`tag ${THREAT_CLASS[c.threat]}`}>{THREAT_LABEL[c.threat]}</span>
                  <div style={{display:'flex',gap:6}}>
                    <button className="btn-sm" onClick={()=>openEdit(c)}>✏️</button>
                    <button className="btn-danger-sm" onClick={()=>remove(c.id)}>🗑️</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {showModal && (
        <div className="modal-overlay" onClick={e=>e.target.className==='modal-overlay'&&setShowModal(false)}>
          <div className="modal">
            <div className="modal-title">{editing ? 'Uredi konkurenta' : 'Dodaj konkurenta'}</div>
            <div className="form-group"><label>Ime hotela</label><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} /></div>
            <div className="form-group"><label>Tip konkurence</label>
              <select value={form.type} onChange={e=>setForm({...form,type:e.target.value})}>
                <option>Direktna konkurenca</option><option>Posredna konkurenca</option><option>Strateška referenca</option>
              </select>
            </div>
            <div className="form-group"><label>Zvezdice</label>
              <select value={form.stars} onChange={e=>setForm({...form,stars:Number(e.target.value)})}>
                {[1,2,3,4,5].map(s=><option key={s} value={s}>{s} ★</option>)}
              </select>
            </div>
            <div className="form-group"><label>Povprečna cena (€)</label><input type="number" value={form.avgPrice} onChange={e=>setForm({...form,avgPrice:e.target.value})} /></div>
            <div className="form-group"><label>Stopnja grožnje</label>
              <select value={form.threat} onChange={e=>setForm({...form,threat:e.target.value})}>
                <option value="high">Visoka</option><option value="med">Srednja</option><option value="low">Nizka</option>
              </select>
            </div>
            <div className="form-group"><label>Opombe</label><textarea value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} rows={3} /></div>
            <div className="modal-footer">
              <button className="btn-outline" onClick={()=>setShowModal(false)}>Prekliči</button>
              <button className="btn-gold" onClick={save}>Shrani</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── EVENTS ───────────────────────────────────────────────────────────────────
function Events(){
  const [events, setEvents] = useState(DEMO_EVENTS);
  const [showModal, setShowModal] = useState(false);
  const [form, setForm] = useState({ name:'', date:'', end_date:'', event_type:'conference', city:'', impact_multiplier:1.10, expected_demand:'medium' });

  const today = new Date().toISOString().split('T')[0];
  const upcoming = events.filter(e=>e.end_date >= today).sort((a,b)=>a.date.localeCompare(b.date));
  const past = events.filter(e=>e.end_date < today).sort((a,b)=>b.date.localeCompare(a.date));

  function save(){
    if(!form.name || !form.date) return;
    setEvents(es=>[...es, {...form, id:Date.now(), end_date: form.end_date || form.date}]);
    setShowModal(false);
    setForm({ name:'', date:'', end_date:'', event_type:'conference', city:'', impact_multiplier:1.10, expected_demand:'medium' });
  }
  function remove(id){ setEvents(es=>es.filter(e=>e.id!==id)); }

  const EVENT_TYPES = ['conference','festival','holiday','sports','concert','other'];
  const EVENT_TYPE_SL = { conference:'Kongres', festival:'Festival', holiday:'Praznik', sports:'Šport', concert:'Koncert', other:'Drugo' };
  const TYPE_ICONS = { conference:'🏛️', festival:'🍷', holiday:'🎉', sports:'🏃', concert:'🎵', other:'📌' };
  const DEMAND_LABEL = { low:'Nizko', medium:'Srednje', high:'Visoko', very_high:'Zelo visoko' };
  const DEMAND_CLASS = { low:'tag-low', medium:'tag-blue', high:'tag-med', very_high:'tag-high' };

  function EventRow({ev}){
    const start = new Date(ev.date);
    const months = ['Jan','Feb','Mar','Apr','Maj','Jun','Jul','Avg','Sep','Okt','Nov','Dec'];
    const impactPct = '+' + Math.round((ev.impact_multiplier - 1)*100) + '%';
    return (
      <div className="event-item">
        <div className="event-date">
          <div className="day">{start.getDate()}</div>
          <div className="month">{months[start.getMonth()]}</div>
        </div>
        <div style={{fontSize:22}}>{TYPE_ICONS[ev.event_type]||'📌'}</div>
        <div className="event-body">
          <div className="event-name">{ev.name}</div>
          <div className="event-loc">{ev.city} · {EVENT_TYPE_SL[ev.event_type]} {ev.end_date !== ev.date ? `(do ${ev.end_date})` : ''}</div>
        </div>
        <div style={{textAlign:'right',minWidth:100}}>
          <span className="tag tag-med" style={{display:'block',marginBottom:4}}>{impactPct}</span>
          <span className={`tag ${DEMAND_CLASS[ev.expected_demand]}`}>{DEMAND_LABEL[ev.expected_demand]}</span>
        </div>
        <button className="btn-danger-sm" onClick={()=>remove(ev.id)}>🗑️</button>
      </div>
    );
  }

  return (
    <div>
      <div className="card">
        <div className="section-header">
          <div className="section-title">📅 Prihajajoči dogodki</div>
          <button className="btn-gold" onClick={()=>setShowModal(true)}>+ Dodaj dogodek</button>
        </div>
        {upcoming.length === 0 ? <div className="empty-state">Ni prihajajočih dogodkov.</div> :
          upcoming.map(ev=><EventRow key={ev.id} ev={ev} />)
        }
        {past.length > 0 && (
          <>
            <div className="divider" />
            <div style={{fontSize:11,fontWeight:700,letterSpacing:'2px',textTransform:'uppercase',color:'#8892a8',marginBottom:12}}>Pretekli dogodki</div>
            {past.map(ev=><EventRow key={ev.id} ev={ev} />)}
          </>
        )}
      </div>

      {showModal && (
        <div className="modal-overlay" onClick={e=>e.target.className==='modal-overlay'&&setShowModal(false)}>
          <div className="modal">
            <div className="modal-title">Dodaj dogodek</div>
            <div className="form-group"><label>Ime dogodka</label><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} /></div>
            <div className="form-group"><label>Datum začetka</label><input type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value,end_date:e.target.value})} /></div>
            <div className="form-group"><label>Datum konca</label><input type="date" value={form.end_date} onChange={e=>setForm({...form,end_date:e.target.value})} /></div>
            <div className="form-group"><label>Tip dogodka</label>
              <select value={form.event_type} onChange={e=>setForm({...form,event_type:e.target.value})}>
                {EVENT_TYPES.map(t=><option key={t} value={t}>{EVENT_TYPE_SL[t]}</option>)}
              </select>
            </div>
            <div className="form-group"><label>Mesto</label><input value={form.city} onChange={e=>setForm({...form,city:e.target.value})} /></div>
            <div className="form-group"><label>Vpliv na ceno (npr. 1.20 = +20%)</label><input type="number" step="0.01" min="0.5" max="3" value={form.impact_multiplier} onChange={e=>setForm({...form,impact_multiplier:Number(e.target.value)})} /></div>
            <div className="form-group"><label>Pričakovano povpraševanje</label>
              <select value={form.expected_demand} onChange={e=>setForm({...form,expected_demand:e.target.value})}>
                <option value="low">Nizko</option><option value="medium">Srednje</option><option value="high">Visoko</option><option value="very_high">Zelo visoko</option>
              </select>
            </div>
            <div className="modal-footer">
              <button className="btn-outline" onClick={()=>setShowModal(false)}>Prekliči</button>
              <button className="btn-gold" onClick={save}>Shrani</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── SETTINGS ─────────────────────────────────────────────────────────────────
function Settings({ hotel }){
  return (
    <div>
      <div className="card" style={{marginBottom:20}}>
        <div className="card-title">🏨 Profil hotela</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          <div className="form-group"><label>Ime hotela</label><input defaultValue={hotel.name} /></div>
          <div className="form-group"><label>Lokacija</label><input defaultValue={hotel.location} /></div>
          <div className="form-group"><label>Skupno število sob</label><input type="number" defaultValue={hotel.rooms} /></div>
          <div className="form-group"><label>Kategorija</label><select defaultValue="4"><option value="3">3 zvezde</option><option value="4">4 zvezde</option><option value="5">5 zvezd</option></select></div>
        </div>
        <button className="btn-gold">Shrani spremembe</button>
      </div>
      <div className="card">
        <div className="card-title">🛏️ Tipi sob & cene</div>
        <table className="pricing-table">
          <thead><tr><th>Tip</th><th>Število</th><th>Osnovna cena</th><th>Min</th><th>Max</th></tr></thead>
          <tbody>
            {hotel.roomTypes.map(rt=>(
              <tr key={rt.id}>
                <td><strong>{rt.name}</strong></td>
                <td><input type="number" defaultValue={rt.count} style={{width:60,padding:'4px 8px',border:'1px solid #dde1eb',borderRadius:6,fontSize:13}} /></td>
                <td><input type="number" defaultValue={rt.basePrice} style={{width:80,padding:'4px 8px',border:'1px solid #dde1eb',borderRadius:6,fontSize:13}} /></td>
                <td><input type="number" defaultValue={rt.minPrice} style={{width:80,padding:'4px 8px',border:'1px solid #dde1eb',borderRadius:6,fontSize:13}} /></td>
                <td><input type="number" defaultValue={rt.maxPrice} style={{width:80,padding:'4px 8px',border:'1px solid #dde1eb',borderRadius:6,fontSize:13}} /></td>
              </tr>
            ))}
          </tbody>
        </table>
        <button className="btn-gold" style={{marginTop:16}}>Shrani cene</button>
      </div>
    </div>
  );
}

// ─── APP SHELL ─────────────────────────────────────────────────────────────────
function App(){
  const [user, setUser] = useState(null);
  const [page, setPage] = useState('dashboard');
  const hotel = DEMO_HOTEL;

  if(!user) return <LoginScreen onLogin={setUser} />;

  const NAV = [
    { id:'dashboard', label:'Dashboard', icon:'📊', section:'Analitika' },
    { id:'pricing', label:'Pricing Engine', icon:'💡', section:'Analitika' },
    { id:'competitors', label:'Competitor Radar', icon:'🎯', section:'Tržni podatki' },
    { id:'events', label:'Dogodki', icon:'📅', section:'Tržni podatki' },
    { id:'settings', label:'Nastavitve', icon:'⚙️', section:'Konfiguracija' },
  ];

  const sections = [...new Set(NAV.map(n=>n.section))];
  const PAGE_TITLES = { dashboard:'Dashboard', pricing:'Pricing Engine', competitors:'Competitor Radar', events:'Dogodki', settings:'Nastavitve' };
  const today = new Date().toLocaleDateString('sl-SI',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  return (
    <div className="app-shell">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="brand">MHC REVENUE</div>
          <div className="sub">Revenue Management</div>
        </div>
        <div className="sidebar-hotel">
          <strong>{hotel.name}</strong>
          {hotel.location}
          <div><span className="badge">{user === 'admin' ? 'Admin' : 'Hotel'}</span></div>
        </div>
        <nav className="sidebar-nav">
          {sections.map(section=>(
            <div key={section}>
              <div className="nav-section">{section}</div>
              {NAV.filter(n=>n.section===section).map(n=>(
                <div key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
                  <span className="nav-icon">{n.icon}</span>
                  {n.label}
                </div>
              ))}
            </div>
          ))}
        </nav>
        <div className="sidebar-footer" onClick={()=>setUser(null)}>
          ← Odjava
        </div>
      </aside>
      <main className="main">
        <div className="topbar">
          <div>
            <div className="topbar-title">{PAGE_TITLES[page]}</div>
            <div className="topbar-meta">{today} · {hotel.name}</div>
          </div>
          <div className="topbar-actions">
            <span className="badge-pill badge-demo">DEMO</span>
            <span style={{fontSize:12,color:'#8892a8'}}>Vila Bled</span>
          </div>
        </div>
        <div className="page-content">
          {page==='dashboard' && <Dashboard hotel={hotel} />}
          {page==='pricing' && <PricingEngine hotel={hotel} />}
          {page==='competitors' && <CompetitorRadar hotel={hotel} />}
          {page==='events' && <Events />}
          {page==='settings' && <Settings hotel={hotel} />}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
