<script type="text/babel">
const { useState, useEffect, useRef } = React;

const EVENT_API_KEY = 'YOUR_TICKETMASTER_API_KEY';

const DEMO_HOTEL = {
  id: 'vila-bled',
  name: 'Vila Bled',
  location: 'Bled, Slovenija',
  lat: 46.37,
  lon: 14.09,
  rooms: 30,
  roomTypes: [
    { id: 'st', name: 'Soba s pogledom na jezero', count: 12, basePrice: 336, minPrice: 240, maxPrice: 500 },
    { id: 'su', name: 'Superior', count: 10, basePrice: 313, minPrice: 220, maxPrice: 460 },
    { id: 'jn', name: 'Suita s pogledom na jezero', count: 5, basePrice: 386, minPrice: 280, maxPrice: 580 },
    { id: 'dt', name: 'Suita Deluxe', count: 3, basePrice: 486, minPrice: 360, maxPrice: 720 },
  ]
};

const DEMO_COMPETITORS = [
  { id: 1, name: 'Grand Hotel Toplice', type: 'Direktna konkurenca', stars: 5, avgPrice: 290, threat: 'high', notes: 'Referenčna točka za višje segmente' },
  { id: 2, name: 'Hotel Jezero', type: 'Direktna konkurenca', stars: 4, avgPrice: 195, threat: 'high', notes: 'Zelo podobna ponudba, aktivno znižuje cene' },
  { id: 3, name: 'Triglav Bled', type: 'Direktna konkurenca', stars: 4, avgPrice: 170, threat: 'med', notes: 'Budget-friendly, dela pritisk navzdol' },
  { id: 4, name: 'Penzion Mayer', type: 'Posredna konkurenca', stars: 3, avgPrice: 110, threat: 'low', notes: '' },
];

function buildDemoReservations() {
  const data = [];
  const today = new Date();
  for (let i = -60; i <= 90; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() + i);
    const dayOfYear = Math.floor((d - new Date(d.getFullYear(), 0, 0)) / 86400000);
    const seasonal = 1 + 0.6 * Math.sin((dayOfYear / 365) * 2 * Math.PI - 1.5);
    const rooms = Math.round(DEMO_HOTEL.rooms * 0.5 * seasonal + Math.random() * 8 - 4);
    data.push({
      date: d.toISOString().split('T')[0],
      occupiedRooms: Math.max(0, Math.min(rooms, DEMO_HOTEL.rooms)),
      revenue: rooms * 220 * seasonal
    });
  }
  return data;
}
const DEMO_RESERVATIONS = buildDemoReservations();

const DEMO_EVENTS = [
  { id: 1, name: 'Okusiti Slovenijo', date: '2026-07-04', end_date: '2026-07-06', event_type: 'festival', location: 'Bled', impact_multiplier: 1.18, expected_demand: 'high', city: 'Bled' },
  { id: 2, name: 'Bled Strategic Forum', date: '2026-09-02', end_date: '2026-09-04', event_type: 'conference', location: 'Bled', impact_multiplier: 1.35, expected_demand: 'very_high', city: 'Bled' },
  { id: 3, name: 'Triglav Trail', date: '2026-07-18', end_date: '2026-07-19', event_type: 'sports', location: 'Bled', impact_multiplier: 1.22, expected_demand: 'high', city: 'Bled' },
  { id: 4, name: 'Ljubljana Festival', date: '2026-07-11', end_date: '2026-07-13', event_type: 'festival', location: 'Ljubljana', impact_multiplier: 1.08, expected_demand: 'medium', city: 'Ljubljana' },
  { id: 5, name: 'Poletni kongres HGS', date: '2026-06-25', end_date: '2026-06-26', event_type: 'conference', location: 'Bled', impact_multiplier: 1.15, expected_demand: 'medium', city: 'Bled' },
];

const SLO_HOLIDAYS = ['01-01','02-08','04-27','05-01','05-02','06-08','06-25','08-15','10-31','11-01','12-25','12-26'];

function formatEUR(n) {
  return new Intl.NumberFormat('sl-SI', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(n);
}
function fmt(n) { return new Intl.NumberFormat('sl-SI').format(n); }

function getOccupancyForDate(dateStr) {
  const r = DEMO_RESERVATIONS.find(d => d.date === dateStr);
  if (!r) return { pct: 0, rooms: 0 };
  return { pct: Math.round(r.occupiedRooms / DEMO_HOTEL.rooms * 100), rooms: r.occupiedRooms };
}

const SUPERIOR_BASE = 313;

function computeBenchmark(competitors) {
  const direct = competitors.filter(c => c.type === 'Direktna konkurenca');
  const pool = direct.length ? direct : competitors;
  if (!pool.length) return 240;
  return Math.round(pool.reduce((s, c) => s + c.avgPrice, 0) / pool.length);
}

function getPriceRecommendation(roomType, dateStr, weather, occ, benchmark) {
  const date = new Date(dateStr);
  const month = date.getMonth() + 1;
  const dayOfWeek = date.getDay();
  const mmdd = `${String(month).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
  let factors = [];

  if ([7, 8].includes(month)) factors.push({ name: 'Peak sezona (jul/avg)', val: 0.08 });
  else if ([6, 9].includes(month)) factors.push({ name: 'Predsezona (jun/sep)', val: 0.03 });
  else if ([12, 3].includes(month)) factors.push({ name: 'Ski sezona (dec/mar)', val: 0.02 });
  else if ([1, 2].includes(month)) factors.push({ name: 'Mrtva sezona (jan/feb)', val: -0.10 });
  else if ([11].includes(month)) factors.push({ name: 'Nizka sezona (nov)', val: -0.06 });

  if ([5, 6].includes(dayOfWeek)) factors.push({ name: 'Vikend', val: 0.03 });
  if (SLO_HOLIDAYS.includes(mmdd)) factors.push({ name: 'Državni praznik', val: 0.05 });

  if (occ >= 90) factors.push({ name: 'Zasedenost >=90%', val: 0.05 });
  else if (occ >= 80) factors.push({ name: 'Zasedenost >=80%', val: 0.03 });
  else if (occ >= 65) factors.push({ name: 'Zasedenost >=65%', val: 0.01 });
  else if (occ < 35) factors.push({ name: 'Nizka zasedenost', val: -0.04 });
  else if (occ < 20) factors.push({ name: 'Zelo nizka zasedenost', val: -0.07 });

  if (weather?.weathercode !== undefined) {
    const wc = weather.weathercode;
    if (wc === 0 || wc === 1) factors.push({ name: 'Sončno vreme', val: 0.01 });
    else if (wc >= 61) factors.push({ name: 'Dežuje', val: -0.01 });
  }

  let totalAdj = factors.reduce((s, f) => s + f.val, 0);
  totalAdj = Math.max(-0.12, Math.min(0.12, totalAdj));

  const marketBase = (benchmark || 240) * 1.10;
  const superiorPrice = Math.round(marketBase * (1 + totalAdj) / 5) * 5;
  const roomRatio = roomType.basePrice / SUPERIOR_BASE;
  const rawPrice = Math.round(superiorPrice * roomRatio / 5) * 5;

  return {
    price: Math.max(roomType.minPrice, Math.min(roomType.maxPrice, rawPrice)),
    factors,
    capped: Math.abs(totalAdj) >= 0.119
  };
}

async function geocodeLocation(query) {
  const url = `https://nominatim.openstreetmap.org/search?format=jsonv2&q=${encodeURIComponent(query)}&limit=1`;
  const res = await fetch(url, { headers: { Accept: 'application/json' } });
  const data = await res.json();
  if (!data?.length) return null;
  return { lat: Number(data[0].lat), lon: Number(data[0].lon) };
}

async function fetchNearbyEvents(lat, lon) {
  const url = `https://app.ticketmaster.com/discovery/v2/events.json?apikey=${EVENT_API_KEY}&latlong=${lat},${lon}&radius=50&unit=km&locale=sl-SI&size=10`;
  const res = await fetch(url);
  const data = await res.json();
  const events = data?._embedded?.events || [];
  return events.map(ev => ({
    id: ev.id,
    name: ev.name,
    date: ev.dates?.start?.localDate || '',
    end_date: ev.dates?.start?.localDate || '',
    event_type: ev.classifications?.[0]?.segment?.name?.toLowerCase() || 'event',
    location: ev._embedded?.venues?.[0]?.name || '',
    city: ev._embedded?.venues?.[0]?.city?.name || '',
    impact_multiplier: 1.05,
    expected_demand: 'medium'
  }));
}

function LocalEvents() {
  const [eventLocation, setEventLocation] = useState('Bled, Slovenia');
  const [searchTerm, setSearchTerm] = useState('');
  const [apiEvents, setApiEvents] = useState([]);
  const [eventLoading, setEventLoading] = useState(false);
  const [eventError, setEventError] = useState('');

  useEffect(() => {
    let active = true;
    async function loadEvents() {
      setEventLoading(true);
      setEventError('');
      try {
        const geo = await geocodeLocation(eventLocation);
        if (!geo) {
          if (!active) return;
          setApiEvents(DEMO_EVENTS);
          setEventError('Lokacije ni bilo mogoče najti. Prikazujem demo dogodke.');
          return;
        }
        const events = await fetchNearbyEvents(geo.lat, geo.lon);
        if (!active) return;
        setApiEvents(events.length ? events : DEMO_EVENTS);
        if (!events.length) setEventError('API trenutno nima zadetkov. Prikazujem demo dogodke.');
      } catch (e) {
        if (!active) return;
        setApiEvents(DEMO_EVENTS);
        setEventError('Napaka pri nalaganju dogodkov. Prikazujem demo dogodke.');
      } finally {
        if (active) setEventLoading(false);
      }
    }
    loadEvents();
    return () => { active = false; };
  }, [eventLocation]);

  const filteredEvents = apiEvents.filter(ev => {
    const q = searchTerm.trim().toLowerCase();
    if (!q) return true;
    return (
      ev.name.toLowerCase().includes(q) ||
      ev.location.toLowerCase().includes(q) ||
      ev.city.toLowerCase().includes(q) ||
      ev.event_type.toLowerCase().includes(q)
    );
  });

  return (
    <div className="card">
      <div className="card-title">📍 Lokalni dogodki</div>

      <div className="event-search">
        <input
          type="text"
          value={eventLocation}
          onChange={e => setEventLocation(e.target.value)}
          placeholder="Vnesi lokacijo, npr. Bled, Slovenia"
        />
      </div>

      <div className="event-search">
        <input
          type="text"
          value={searchTerm}
          onChange={e => setSearchTerm(e.target.value)}
          placeholder="Išči dogodke po imenu, lokaciji ali tipu..."
        />
        {searchTerm && <button className="btn-sm" onClick={() => setSearchTerm('')}>Počisti</button>}
      </div>

      {eventLoading && <div className="empty-state">Nalagam dogodke …</div>}
      {eventError && <div className="empty-state">{eventError}</div>}

      <div className="local-events">
        {!eventLoading && filteredEvents.length > 0 ? filteredEvents.map(ev => (
          <div key={ev.id} className="local-event-card">
            <div className="local-event-main">
              <div className="local-event-name">{ev.name}</div>
              <div className="local-event-meta">{ev.city} · {ev.location} · {ev.event_type} · {ev.date}</div>
            </div>
            <span className="tag tag-med">API</span>
          </div>
        )) : !eventLoading ? <div className="empty-state">Ni dogodkov za izbrani kriterij.</div> : null}
      </div>
    </div>
  );
}

function CompetitorRadar({ hotel, competitors, setCompetitors }) {
  const [showModal, setShowModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({ name: '', type: 'Direktna konkurenca', stars: 4, avgPrice: '', threat: 'med', notes: '' });

  const superiorRoom = hotel.roomTypes.find(rt => rt.id === 'su') || hotel.roomTypes[1];
  const hotelADR = superiorRoom.basePrice;
  const avgCompPrice = Math.round(competitors.reduce((s, c) => s + c.avgPrice, 0) / competitors.length);

  function openAdd() {
    setEditing(null);
    setForm({ name: '', type: 'Direktna konkurenca', stars: 4, avgPrice: '', threat: 'med', notes: '' });
    setShowModal(true);
  }

  function save() {
    if (!form.name.trim() || !form.avgPrice) return;
    const entry = { ...form, avgPrice: Number(form.avgPrice), id: editing || Date.now() };
    if (editing) setCompetitors(cs => cs.map(c => c.id === editing ? entry : c));
    else setCompetitors(cs => [...cs, entry]);
    setShowModal(false);
  }

  function remove(id) {
    setCompetitors(cs => cs.filter(c => c.id !== id));
  }

  const THREAT_LABEL = { high: 'Visoka', med: 'Srednja', low: 'Nizka' };
  const THREAT_CLASS = { high: 'tag-high', med: 'tag-med', low: 'tag-low' };

  return (
    <div>
      <div className="grid-3" style={{ marginBottom: 24 }}>
        <div className="kpi-tile">
          <div className="kpi-label">Benchmark</div>
          <div className="kpi-value">{formatEUR(avgCompPrice)}</div>
          <div className="kpi-sub">Povprečje konkurence</div>
        </div>
        <div className="kpi-tile">
          <div className="kpi-label">ADR Vila Bled</div>
          <div className="kpi-value">{formatEUR(hotelADR)}</div>
          <div className="kpi-sub">Referenčna Superior cena</div>
        </div>
        <div className="kpi-tile">
          <div className="kpi-label">Št. konkurentov</div>
          <div className="kpi-value">{competitors.length}</div>
          <div className="kpi-sub">V bazi radarja</div>
        </div>
      </div>

      <div className="card">
        <div style={{ display: 'flex', justifyContent: 'space-between', gap: 12, alignItems: 'center', flexWrap: 'wrap' }}>
          <div className="card-title" style={{ marginBottom: 0 }}>Konkurenti</div>
          <button className="btn-gold" onClick={openAdd}>+ Dodaj konkurenta</button>
        </div>

        <div style={{ display: 'grid', gap: 12, marginTop: 20 }}>
          {competitors.map(c => (
            <div key={c.id} className="competitor-card">
              <div style={{ minWidth: 0 }}>
                <div className="comp-name">{c.name}</div>
                <div className="comp-type">{c.type} · {c.stars}★</div>
                <div style={{ marginTop: 6 }}>
                  <span className={`tag ${THREAT_CLASS[c.threat] || 'tag-med'}`}>{THREAT_LABEL[c.threat] || c.threat}</span>
                </div>
              </div>
              <div>
                <div className="comp-price">{formatEUR(c.avgPrice)}</div>
                <div className={`comp-vs ${c.avgPrice > hotelADR ? 'above' : 'below'}`}>
                  {c.avgPrice > hotelADR ? 'nad nami' : 'pod nami'}
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {showModal && (
        <div className="modal-overlay" onClick={() => setShowModal(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-title">{editing ? 'Uredi konkurenta' : 'Dodaj konkurenta'}</div>
            <div className="form-group"><label>Ime</label><input value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} /></div>
            <div className="form-group">
              <label>Tip</label>
              <select value={form.type} onChange={e => setForm({ ...form, type: e.target.value })}>
                <option>Direktna konkurenca</option>
                <option>Posredna konkurenca</option>
              </select>
            </div>
            <div className="form-group"><label>Število zvezdic</label><input type="number" min="1" max="5" value={form.stars} onChange={e => setForm({ ...form, stars: e.target.value })} /></div>
            <div className="form-group"><label>Povprečna cena</label><input type="number" value={form.avgPrice} onChange={e => setForm({ ...form, avgPrice: e.target.value })} /></div>
            <div className="form-group">
              <label>Grožnja</label>
              <select value={form.threat} onChange={e => setForm({ ...form, threat: e.target.value })}>
                <option value="high">Visoka</option>
                <option value="med">Srednja</option>
                <option value="low">Nizka</option>
              </select>
            </div>
            <div className="form-group"><label>Opombe</label><textarea rows="3" value={form.notes} onChange={e => setForm({ ...form, notes: e.target.value })}></textarea></div>
            <div className="modal-footer">
              <button className="btn-sm" onClick={() => setShowModal(false)}>Prekliči</button>
              {editing && <button className="btn-danger-sm" onClick={() => remove(editing)}>Izbriši</button>}
              <button className="btn-gold" onClick={save}>Shrani</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState('dashboard');
  const [hotel] = useState(DEMO_HOTEL);
  const [competitors, setCompetitors] = useState(DEMO_COMPETITORS);
  const benchmark = computeBenchmark(competitors);
  const [upcomingEvents, setUpcomingEvents] = useState(DEMO_EVENTS);

  useEffect(() => {
    const today = new Date().toISOString().split('T')[0];
    setUpcomingEvents(DEMO_EVENTS.filter(e => e.end_date >= today).sort((a, b) => a.date.localeCompare(b.date)));
  }, []);

  if (!user) return <LoginScreen onLogin={setUser} />;

  return (
    <div className="app-shell">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="brand">MHC REVENUE</div>
          <div className="sub">Revenue Management Platform</div>
        </div>
        <div className="sidebar-hotel">
          <strong>{hotel.name}</strong>
          {hotel.location}
          <div className="badge">DEMO / Vila Bled</div>
        </div>

        <div className="sidebar-nav">
          <div className="nav-section">Pogled</div>
          <div className={`nav-item ${page === 'dashboard' ? 'active' : ''}`} onClick={() => setPage('dashboard')}>
            <span className="nav-icon">📈</span>Dashboard
          </div>
          <div className={`nav-item ${page === 'pricing' ? 'active' : ''}`} onClick={() => setPage('pricing')}>
            <span className="nav-icon">💶</span>Pricing Engine
          </div>
          <div className={`nav-item ${page === 'events' ? 'active' : ''}`} onClick={() => setPage('events')}>
            <span className="nav-icon">📍</span>Lokalni dogodki
          </div>
          <div className={`nav-item ${page === 'competitors' ? 'active' : ''}`} onClick={() => setPage('competitors')}>
            <span className="nav-icon">🎯</span>Competitor Radar
          </div>
        </div>

        <div className="sidebar-footer">Admin · Demo račun</div>
      </aside>

      <main className="main">
        <div className="topbar">
          <div style={{ minWidth: 0 }}>
            <div className="topbar-title">
              {page === 'dashboard' ? 'Dashboard' : page === 'pricing' ? 'Pricing Engine' : page === 'events' ? 'Lokalni dogodki' : 'Competitor Radar'}
            </div>
            <div className="topbar-meta">MHC Revenue · Upravljanje cen za hotel {hotel.name}</div>
          </div>
          <div className="topbar-actions">
            <span className="badge-pill badge-demo">DEMO</span>
            <button className="btn-outline" onClick={() => setUser(null)}>Odjava</button>
          </div>
        </div>

        <div className="page-content">
          <div className="mobile-tabs">
            <button className={page === 'dashboard' ? 'active' : ''} onClick={() => setPage('dashboard')}>Dashboard</button>
            <button className={page === 'pricing' ? 'active' : ''} onClick={() => setPage('pricing')}>Pricing Engine</button>
            <button className={page === 'events' ? 'active' : ''} onClick={() => setPage('events')}>Lokalni dogodki</button>
            <button className={page === 'competitors' ? 'active' : ''} onClick={() => setPage('competitors')}>Competitor Radar</button>
          </div>

          {page === 'dashboard' && <Dashboard hotel={hotel} benchmark={benchmark} upcomingEvents={upcomingEvents} />}
          {page === 'pricing' && <PricingEngine hotel={hotel} benchmark={benchmark} />}
          {page === 'events' && <LocalEvents />}
          {page === 'competitors' && <CompetitorRadar hotel={hotel} competitors={competitors} setCompetitors={setCompetitors} />}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
