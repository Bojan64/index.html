<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MHC Revenue — Upravljanje cen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --navy: #162040;
    --navy-light: #1e2d56;
    --navy-dark: #0e1628;
    --gold: #b49448;
    --gold-light: #d4b870;
    --gold-pale: #f5edd8;
    --white: #ffffff;
    --gray-50: #f8f9fb;
    --gray-100: #eef0f5;
    --gray-200: #dde1eb;
    --gray-400: #8892a8;
    --gray-600: #4a5568;
    --green: #2d7d56;
    --green-light: #e8f5ef;
    --red: #c0392b;
    --red-light: #fdecea;
    --orange: #d97706;
    --orange-light: #fef3c7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    max-width: 100%;
    overflow-x: hidden;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--gray-50);
    color: var(--navy);
    min-width: 0;
  }

  img, canvas, svg, video {
    max-width: 100%;
  }

  h1,h2,h3,h4 { font-family: 'Cormorant Garamond', serif; }

  .auth-screen {
    min-height: 100vh;
    background: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(180,148,72,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(180,148,72,0.05) 0%, transparent 50%);
    padding: 20px;
  }

  .auth-card {
    background: var(--white);
    border-radius: 12px;
    padding: 48px 40px;
    width: min(400px, 100%);
    box-shadow: 0 24px 80px rgba(0,0,0,0.3);
  }

  .auth-logo { text-align: center; margin-bottom: 32px; }

  .auth-logo .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--navy);
    letter-spacing: 2px;
  }

  .auth-logo .sub {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-top: 4px;
  }

  .auth-logo .divider {
    width: 40px;
    height: 2px;
    background: var(--gold);
    margin: 12px auto;
  }

  .form-group { margin-bottom: 20px; }

  .form-group label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gray-600);
    margin-bottom: 6px;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid var(--gray-200);
    border-radius: 8px;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    color: var(--navy);
    background: var(--white);
    transition: border-color 0.2s;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: var(--gold);
  }

  .btn-primary {
    width: 100%;
    padding: 13px;
    background: var(--navy);
    color: var(--white);
    border: none;
    border-radius: 8px;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-primary:hover { background: var(--navy-light); }

  .btn-gold {
    padding: 10px 20px;
    background: var(--gold);
    color: var(--white);
    border: none;
    border-radius: 8px;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-gold:hover { background: var(--gold-light); }

  .btn-outline {
    padding: 8px 16px;
    background: transparent;
    color: var(--navy);
    border: 1.5px solid var(--navy);
    border-radius: 8px;
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-outline:hover { background: var(--navy); color: var(--white); }

  .btn-sm {
    padding: 6px 14px;
    background: var(--gray-100);
    color: var(--gray-600);
    border: none;
    border-radius: 6px;
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-sm:hover { background: var(--gray-200); }

  .btn-danger-sm {
    padding: 6px 14px;
    background: var(--red-light);
    color: var(--red);
    border: none;
    border-radius: 6px;
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .error-msg {
    color: var(--red);
    font-size: 13px;
    margin-top: 12px;
    text-align: center;
  }

  .app-shell {
    display: flex;
    min-height: 100vh;
    width: 100%;
    min-width: 0;
  }

  .sidebar {
    width: 240px;
    min-width: 240px;
    background: var(--navy);
    color: var(--white);
    display: flex;
    flex-direction: column;
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    overflow-y: auto;
    z-index: 100;
  }

  .sidebar-logo {
    padding: 28px 24px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .sidebar-logo .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
  }

  .sidebar-logo .sub {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-top: 2px;
  }

  .sidebar-hotel {
    padding: 16px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    font-size: 12px;
    color: rgba(255,255,255,0.5);
  }

  .sidebar-hotel strong {
    display: block;
    color: var(--white);
    font-size: 13px;
    margin-bottom: 2px;
  }

  .sidebar-hotel .badge {
    display: inline-block;
    background: var(--gold);
    color: var(--white);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 2px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .sidebar-nav {
    flex: 1;
    padding: 16px 0;
  }

  .nav-section {
    padding: 8px 24px 4px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 24px;
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    transition: all 0.15s;
    border-left: 3px solid transparent;
  }

  .nav-item:hover {
    color: var(--white);
    background: rgba(255,255,255,0.05);
  }

  .nav-item.active {
    color: var(--white);
    background: rgba(180,148,72,0.12);
    border-left-color: var(--gold);
  }

  .nav-icon {
    font-size: 16px;
    width: 20px;
    text-align: center;
  }

  .sidebar-footer {
    padding: 16px 24px;
    border-top: 1px solid rgba(255,255,255,0.08);
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    cursor: pointer;
  }

  .sidebar-footer:hover { color: rgba(255,255,255,0.7); }

  .main {
    margin-left: 240px;
    flex: 1;
    min-width: 0;
  }

  .topbar {
    background: var(--white);
    border-bottom: 1px solid var(--gray-200);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 50;
    min-width: 0;
  }

  .topbar-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--navy);
  }

  .topbar-meta {
    font-size: 12px;
    color: var(--gray-400);
    margin-top: 2px;
  }

  .topbar-actions {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    min-width: 0;
  }

  .page-content {
    padding: 28px 32px;
    min-width: 0;
  }

  .mobile-tabs {
    display: none;
    gap: 8px;
    padding: 0 0 16px;
    flex-wrap: wrap;
  }

  .mobile-tabs button {
    border: 1px solid var(--gray-200);
    background: var(--white);
    color: var(--navy);
    border-radius: 999px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 700;
  }

  .mobile-tabs button.active {
    background: var(--navy);
    color: var(--white);
    border-color: var(--navy);
  }

  .card {
    background: var(--white);
    border-radius: 12px;
    border: 1px solid var(--gray-200);
    padding: 24px;
    min-width: 0;
  }

  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }

  .grid-4 {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 16px;
    margin-bottom: 24px;
    min-width: 0;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 20px;
    margin-bottom: 24px;
    min-width: 0;
  }

  .grid-3 {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 16px;
    min-width: 0;
  }

  .kpi-tile {
    background: var(--white);
    border-radius: 12px;
    border: 1px solid var(--gray-200);
    padding: 20px;
    min-width: 0;
  }

  .kpi-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gray-400);
    margin-bottom: 8px;
  }

  .kpi-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--navy);
    line-height: 1;
    overflow-wrap: anywhere;
  }

  .kpi-sub {
    font-size: 12px;
    color: var(--gray-400);
    margin-top: 6px;
    overflow-wrap: anywhere;
  }

  .kpi-change {
    font-size: 12px;
    font-weight: 700;
    margin-top: 4px;
  }

  .kpi-change.up { color: var(--green); }
  .kpi-change.down { color: var(--red); }

  .kpi-tile.highlight {
    background: var(--navy);
    border-color: var(--navy);
  }

  .kpi-tile.highlight .kpi-label { color: rgba(255,255,255,0.5); }
  .kpi-tile.highlight .kpi-value { color: var(--gold-light); }
  .kpi-tile.highlight .kpi-sub { color: rgba(255,255,255,0.4); }

  .pricing-table {
    width: 100%;
    border-collapse: collapse;
  }

  .pricing-table th {
    text-align: left;
    padding: 10px 14px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gray-400);
    border-bottom: 2px solid var(--gray-200);
    background: var(--gray-50);
  }

  .pricing-table td {
    padding: 14px;
    border-bottom: 1px solid var(--gray-100);
    font-size: 13px;
    vertical-align: middle;
    overflow-wrap: anywhere;
  }

  .pricing-table tr:hover td { background: var(--gray-50); }

  .price-rec {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--navy);
  }

  .price-base {
    font-size: 12px;
    color: var(--gray-400);
    text-decoration: line-through;
  }

  .price-delta {
    font-size: 12px;
    font-weight: 700;
  }

  .price-delta.up { color: var(--green); }
  .price-delta.down { color: var(--red); }
  .price-delta.neutral { color: var(--gray-400); }

  .tag {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
  }

  .tag-high { background: var(--red-light); color: var(--red); }
  .tag-med { background: var(--orange-light); color: var(--orange); }
  .tag-low { background: var(--green-light); color: var(--green); }
  .tag-blue { background: #e8eef8; color: var(--navy); }

  .ai-reasoning {
    background: var(--navy-dark);
    color: rgba(255,255,255,0.85);
    border-radius: 8px;
    padding: 16px;
    font-size: 13px;
    line-height: 1.7;
    border-left: 3px solid var(--gold);
    white-space: pre-wrap;
  }

  .ai-reasoning .ai-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .ai-loading {
    color: rgba(255,255,255,0.4);
    font-style: italic;
  }

  .weather-widget {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
    color: var(--white);
    border-radius: 12px;
    padding: 20px;
    min-width: 0;
  }

  .weather-temp {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px;
    font-weight: 700;
    line-height: 1;
  }

  .weather-desc {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    margin-top: 4px;
  }

  .weather-row {
    display: flex;
    gap: 16px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .weather-item {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
  }

  .weather-item strong {
    color: var(--white);
    display: block;
    font-size: 14px;
  }

  .competitor-card {
    border: 1px solid var(--gray-200);
    border-radius: 10px;
    padding: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: border-color 0.2s;
    min-width: 0;
    gap: 16px;
  }

  .competitor-card:hover { border-color: var(--gold); }

  .comp-name {
    font-weight: 700;
    font-size: 14px;
    color: var(--navy);
    overflow-wrap: anywhere;
  }

  .comp-type { font-size: 11px; color: var(--gray-400); }

  .comp-price {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--navy);
    text-align: right;
  }

  .comp-vs {
    font-size: 11px;
    font-weight: 700;
  }

  .comp-vs.above { color: var(--green); }
  .comp-vs.below { color: var(--red); }

  .event-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid var(--gray-100);
    min-width: 0;
  }

  .event-date {
    min-width: 50px;
    text-align: center;
  }

  .event-date .day {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
    color: var(--navy);
  }

  .event-date .month {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--gray-400);
  }

  .event-body {
    flex: 1;
    min-width: 0;
  }

  .event-name {
    font-weight: 700;
    font-size: 14px;
    color: var(--navy);
    overflow-wrap: anywhere;
  }

  .event-loc {
    font-size: 12px;
    color: var(--gray-400);
    margin-top: 2px;
    overflow-wrap: anywhere;
  }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 16px;
  }

  .modal {
    background: var(--white);
    border-radius: 12px;
    padding: 32px;
    width: min(480px, 100%);
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 32px 80px rgba(0,0,0,0.25);
  }

  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 24px;
  }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 24px;
    flex-wrap: wrap;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--gold-pale);
    color: var(--navy);
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }

  .chart-wrap {
    position: relative;
    height: 220px;
    width: 100%;
    max-width: 100%;
    min-width: 0;
  }

  .chart-wrap canvas {
    display: block;
    width: 100% !important;
    max-width: 100%;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--navy);
  }

  .divider {
    height: 1px;
    background: var(--gray-200);
    margin: 24px 0;
  }

  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--gray-400);
    font-size: 14px;
  }

  .badge-pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
  }

  .badge-demo { background: var(--gold-pale); color: var(--gold); }

  .scroll-wrap {
    overflow-x: auto;
    max-width: 100%;
  }

  .factor-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid var(--gray-100);
    font-size: 13px;
    gap: 12px;
  }

  .factor-row:last-child { border-bottom: none; }

  .factor-name {
    color: var(--gray-600);
    min-width: 0;
    overflow-wrap: anywhere;
  }

  .factor-val {
    font-weight: 700;
    white-space: nowrap;
  }

  .factor-val.pos { color: var(--green); }
  .factor-val.neg { color: var(--red); }
  .factor-val.zero { color: var(--gray-400); }

  @media (max-width: 900px) {
    .sidebar { display: none; }
    .main { margin-left: 0; }
    .grid-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-2 { grid-template-columns: 1fr; }
    .grid-3 { grid-template-columns: 1fr; }
    .mobile-tabs { display: flex; }
    .topbar { padding: 16px 18px; }
    .page-content { padding: 18px; }
  }

  @media (max-width: 480px) {
    .grid-4 { grid-template-columns: 1fr; }
    .auth-card { padding: 28px 20px; }
    .card { padding: 18px; }
    .kpi-value { font-size: 28px; }
    .weather-temp { font-size: 40px; }
    .topbar-title { font-size: 20px; }
    .modal { padding: 22px; }
  }
</style>
</head>
<body>
<div id="root"></div>
